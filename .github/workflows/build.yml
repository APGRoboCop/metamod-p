name: Build

on: ["push", "workflow_dispatch"]

# ---------------------------------------------------------------------------
# This workflow produces six separate artifact sets for comparison:
#
#   AMBuild jobs  (build_ambuild):
#     - Linux x86    (Ubuntu 18.04 + GCC-7,  32-bit, release & fast)
#     - Linux AMD64  (Ubuntu 22.04 + GCC,    64-bit, release & fast)
#     - Win32        (Windows 2022 + MSVC,   32-bit, release & fast)
#
#   Native jobs   (build_native):
#     - Linux x86    (Ubuntu 18.04 + GCC-7,  32-bit, Makefile, release & fast)
#     - Linux AMD64  (Ubuntu 22.04 + GCC,    64-bit, Makefile, release & fast)
#     - Win32        (Windows 2022 + MSVC,   32-bit, MSBuild .vcxproj, release & fast)
#
# Ubuntu 18.04 is used for 32-bit Linux builds because:
#   (a) it still has solid first-class i386 support (multilib packages,
#       libc6-dev:i386, etc.) which Ubuntu 22.04+ has largely dropped, and
#   (b) GCC-7 produces output linked against an older glibc ABI, avoiding
#       symbol-version mismatches when GoldSrc loads the plugin.
#
# Ubuntu 22.04 is used for AMD64 Linux builds because no i386 multilib is
# needed — the host and target word size are the same — and modern runners
# are fine for 64-bit GoldSrc engine deployments (hlds_amd64 / cs_amd64.so).
# ---------------------------------------------------------------------------

# Skip build when commit message contains '[ci skip]'
defaults:
  run:
    shell: bash

jobs:

# ===========================================================================
#  AMBuild jobs
# ===========================================================================
  build_ambuild:
    name: "[AMBuild] ${{ matrix.build_type }} for ${{ matrix.os_short }}"
    runs-on: ${{ matrix.os_version }}

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          # Linux x86 Release  (AMBuild / GCC / Ubuntu 18.04)
          # Ubuntu 18.04: solid i386 multilib support, older glibc ABI.
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-18.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86
            multilib: true
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize"

          # ------------------------------------------------------------------
          # Linux x86 Fast  (AMBuild / GCC / Ubuntu 18.04)
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-18.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86
            multilib: true
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --extra-cppflags=-D__BUILD_FAST_METAMOD__"

          # ------------------------------------------------------------------
          # Linux AMD64 Release  (AMBuild / GCC / Ubuntu 22.04)
          # Ubuntu 22.04: no i386 multilib needed; native 64-bit build.
          # Targets hlds_amd64 / cs_amd64.so deployments.
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86_64
            multilib: false
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize --target-arch=x86_64"

          # ------------------------------------------------------------------
          # Linux AMD64 Fast  (AMBuild / GCC / Ubuntu 22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86_64
            multilib: false
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --target-arch=x86_64 --extra-cppflags=-D__BUILD_FAST_METAMOD__"

          # ------------------------------------------------------------------
          # Windows Release  (AMBuild / MSVC / Windows 2022)
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            package_ext: zip
            dbg_ext: pdb
            cc: not-used
            cxx: not-used
            vs_arch: x32
            am_arch: x86
            multilib: false
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize"

          # ------------------------------------------------------------------
          # Windows Fast  (AMBuild / MSVC / Windows 2022)
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            package_ext: zip
            dbg_ext: pdb
            cc: not-used
            cxx: not-used
            vs_arch: x32
            am_arch: x86
            multilib: false
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --extra-cppflags=-D__BUILD_FAST_METAMOD__"

    steps:
      # -----------------------------------------------------------------------
      # Linux setup
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.multilib == true
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc g++ gcc-multilib g++-multilib
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Install dependencies (Linux AMD64)
        if: runner.os == 'Linux' && matrix.multilib == false
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Windows setup
      # -----------------------------------------------------------------------
      - name: Add MSBuild to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2.0.0

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=*" %%i in (`vswhere -latest -property installationPath`) do (
            call "%%i"\Common7\Tools\vsdevcmd.bat -arch=${{ matrix.vs_arch }} -host_arch=x64
          )
          for /f "delims== tokens=1,2" %%a in ('set') do (
            echo>>"%GITHUB_ENV%" %%a=%%b
          )

      # -----------------------------------------------------------------------
      # Node.js 24  — required by newer AMBuild versions
      # -----------------------------------------------------------------------
      - name: Set up Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      # -----------------------------------------------------------------------
      # Python + AMBuild
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install AMBuild
        run: |
          python -m pip install --upgrade pip wheel
          pip install git+https://github.com/alliedmodders/ambuild

      # -----------------------------------------------------------------------
      # Checkout & build
      # -----------------------------------------------------------------------
      - name: Fetch Metamod-P
        uses: actions/checkout@v4.2.2
        with:
          path: metamod-p
          submodules: recursive

      - name: Build (AMBuild)
        working-directory: metamod-p
        run: |
          mkdir post
          cd post
          export AM_ARCH=${{ matrix.am_arch }}
          python3 ../configure.py ${{ matrix.configure_flags }}
          ambuild

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - uses: benjlevesque/short-sha@v3.0.0
        id: short-sha

      - name: Upload binary (AMBuild)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: metamod-p-ambuild-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ steps.short-sha.outputs.sha }}
          path: metamod-p/post/*

      - name: Upload debug symbols (AMBuild)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: metamod-p-ambuild-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ steps.short-sha.outputs.sha }}
          path: metamod-p/post/**/*.${{ matrix.dbg_ext }}


# ===========================================================================
#  Native build jobs  (Linux Makefile  /  Windows MSBuild .vcxproj)
# ===========================================================================
  build_native:
    name: "[Native] ${{ matrix.build_type }} for ${{ matrix.os_short }}"
    runs-on: ${{ matrix.os_version }}

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          # Linux x86 Release  (Makefile / GCC-7 / Ubuntu 18.04)
          # OPT=opt  →  optimised build, NDEBUG set, output to opt.linux_i386/
          # do_dll_linux copies the final .so to ../dlls/metamod.so
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-18.04
            build_type: release
            artifact_suffix: ""
            multilib: true
            make_args: "OPT=opt"

          # ------------------------------------------------------------------
          # Linux x86 Fast  (Makefile / GCC-7 / Ubuntu 18.04)
          # OPT=opt-fast  →  OPT=opt + -D__BUILD_FAST_METAMOD__ (line 204 of
          # the Makefile injects this automatically; no EXTRA_CPPFLAGS needed)
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-18.04
            build_type: fast
            artifact_suffix: "-fast"
            multilib: true
            make_args: "OPT=opt-fast"

          # ------------------------------------------------------------------
          # Linux AMD64 Release  (Makefile / GCC / Ubuntu 22.04)
          # TARGET=amd64  →  CC="gcc -m64", CCOPT_ARCH=-march=x86-64,
          # output to opt.linux_amd64/metamod.so
          # No i386 multilib needed; native 64-bit host and target.
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            build_type: release
            artifact_suffix: ""
            multilib: false
            make_args: "OPT=opt TARGET=amd64"

          # ------------------------------------------------------------------
          # Linux AMD64 Fast  (Makefile / GCC / Ubuntu 22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            build_type: fast
            artifact_suffix: "-fast"
            multilib: false
            make_args: "OPT=opt-fast TARGET=amd64"

          # ------------------------------------------------------------------
          # Windows Release  (MSBuild / MSVC / Windows 2022)
          # .sln and .vcxproj both live in metamod/.
          # OutDir = $(SolutionDir)$(Configuration)\ → metamod/Release\
          # Release config has GenerateDebugInformation=false → no PDB.
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            build_type: release
            artifact_suffix: ""
            multilib: false
            msbuild_config: "Release"
            msbuild_platform: "Win32"

          # ------------------------------------------------------------------
          # Windows Fast  (MSBuild / MSVC / Windows 2022)
          # Fast is a first-class .sln configuration; __BUILD_FAST_METAMOD__
          # is already in its PreprocessorDefinitions — no injection needed.
          # OutDir → metamod/Fast\
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            build_type: fast
            artifact_suffix: "-fast"
            multilib: false
            msbuild_config: "Fast"
            msbuild_platform: "Win32"

    steps:
      # -----------------------------------------------------------------------
      # Linux setup
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.multilib == true
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc g++ gcc-multilib g++-multilib make
          echo "CC=gcc"   >> $GITHUB_ENV
          echo "CXX=g++"  >> $GITHUB_ENV

      - name: Install dependencies (Linux AMD64)
        if: runner.os == 'Linux' && matrix.multilib == false
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make
          echo "CC=gcc"   >> $GITHUB_ENV
          echo "CXX=g++"  >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Windows setup
      # -----------------------------------------------------------------------
      - name: Add MSBuild to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2.0.0

      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Fetch Metamod-P
        uses: actions/checkout@v4.2.2
        with:
          path: metamod-p
          submodules: recursive

      # -----------------------------------------------------------------------
      # Linux — Makefile build
      # -----------------------------------------------------------------------
      - name: Build (Linux Makefile)
        if: runner.os == 'Linux'
        working-directory: metamod-p
        run: |
          mkdir -p native_out

          # Drive the metamod subdir directly (the toplevel Makefile just
          # loops over $(SUBDIRS) from Config.mak; we only need metamod).
          #
          # The Makefile's OPT= and TARGET= variables control everything:
          #   OPT=opt        → release build  (NDEBUG, -O2, LTO)
          #   OPT=opt-fast   → fast build     (above + __BUILD_FAST_METAMOD__)
          #   TARGET=amd64   → 64-bit         (CC="gcc -m64", march=x86-64)
          #   (default)      → 32-bit         (CC="gcc -m32", march=i686)
          #
          # do_dll_linux builds the .so and installs it to ../dlls/metamod.so
          make -C metamod do_dll_linux ${{ matrix.make_args }} -j$(nproc)

          # Collect the final .so from dlls/ into the staging folder.
          # dlls/debug/ holds sanitizer builds (not built here).
          find dlls -maxdepth 1 -name "*.so" | \
            xargs -I{} cp {} native_out/ 2>/dev/null || true

      # -----------------------------------------------------------------------
      # Windows — MSBuild build
      # -----------------------------------------------------------------------
      - name: Build (Windows MSBuild)
        if: runner.os == 'Windows'
        working-directory: metamod-p
        shell: cmd
        run: |
          :: The .sln and .vcxproj both live in metamod\.
          :: $(SolutionDir) resolves to the directory containing the .sln,
          :: i.e. <repo>\metamod-p\metamod\, so OutDir expands to:
          ::   <repo>\metamod-p\metamod\Release\metamod.dll
          ::   <repo>\metamod-p\metamod\Fast\metamod.dll
          :: Release and Fast have GenerateDebugInformation=false → no PDB.
          msbuild metamod\metamod.sln ^
            /p:Configuration=${{ matrix.msbuild_config }} ^
            /p:Platform=${{ matrix.msbuild_platform }} ^
            /m ^
            /v:minimal

          mkdir native_out
          xcopy /s /y metamod\metamod\${{ matrix.msbuild_config }}\*.dll native_out\ 2>nul || ver>nul
          :: Collect PDBs too in case the config ever has them enabled.
          xcopy /s /y metamod\metamod\${{ matrix.msbuild_config }}\*.pdb native_out\ 2>nul || ver>nul

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - uses: benjlevesque/short-sha@v3.0.0
        id: short-sha

      - name: Upload binary (Native)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: metamod-p-native-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ steps.short-sha.outputs.sha }}
          path: metamod-p/native_out/*

      - name: Upload debug symbols (Native / Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: metamod-p-native-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ steps.short-sha.outputs.sha }}
          path: metamod-p/native_out/**/*.dbg

      - name: Upload debug symbols (Native / Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: metamod-p-native-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ steps.short-sha.outputs.sha }}
          path: metamod-p/native_out/**/*.pdb
