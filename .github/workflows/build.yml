name: Build

on: ["push", "workflow_dispatch"]

# ---------------------------------------------------------------------------
# This workflow produces six separate artifact sets for comparison:
#
#   AMBuild jobs  (build_ambuild):
#     - Linux x86    (Docker ubuntu:18.04 on ubuntu-22.04 runner, GCC-7, 32-bit)
#     - Linux AMD64  (ubuntu-22.04 runner, GCC, 64-bit)
#     - Win32        (windows-2022 runner, MSVC, 32-bit)
#
#   Native jobs   (build_native):
#     - Linux x86    (Docker ubuntu:18.04 on ubuntu-22.04 runner, GCC-7, 32-bit)
#     - Linux AMD64  (ubuntu-22.04 runner, GCC, 64-bit)
#     - Win32        (windows-2022 runner, MSVC, 32-bit)
#
# Why Docker for 32-bit Linux builds:
#   GitHub retired the ubuntu-18.04 runner image in April 2023.  To preserve
#   the old glibc ABI (avoiding symbol-version mismatches when GoldSrc loads
#   the plugin) we run the 32-bit jobs inside an ubuntu:18.04 Docker container
#   on a modern ubuntu-22.04 runner.  The container provides GCC-7 and solid
#   first-class i386/multilib support exactly as the retired image did.
#
# Why ubuntu-22.04 bare for AMD64 builds:
#   No i386 multilib is needed — host and target word size are the same — and
#   modern runners are fine for 64-bit GoldSrc engine deployments
#   (hlds_amd64 / cs_amd64.so).
#
# short-sha: we use github.sha directly instead of the benjlevesque/short-sha
#   action — v2.2 runs on deprecated Node 20 and v3.0.0 was never published.
# ---------------------------------------------------------------------------


# Skip build when commit message contains '[ci skip]'
defaults:
  run:
    shell: bash

jobs:

# ===========================================================================
#  AMBuild jobs
# ===========================================================================
  build_ambuild:
    name: "[AMBuild] ${{ matrix.build_type }} for ${{ matrix.os_short }}"
    runs-on: ${{ matrix.os_version }}

    # Run 32-bit Linux jobs inside an Ubuntu 18.04 container for glibc
    # compatibility. AMD64 and Windows jobs leave container empty (no-op).
    container: ${{ matrix.container }}

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          # Linux x86 Release  (AMBuild / GCC-7 / Docker ubuntu:18.04)
          # Container provides GCC-7 + i386 multilib + glibc 2.27 ABI.
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86
            multilib: true
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize"

          # ------------------------------------------------------------------
          # Linux x86 Fast  (AMBuild / GCC-7 / Docker ubuntu:18.04)
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86
            multilib: true
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --extra-cppflags=-D__BUILD_FAST_METAMOD__"

          # ------------------------------------------------------------------
          # Linux AMD64 Release  (AMBuild / GCC / ubuntu-22.04)
          # No container needed — native 64-bit host and target.
          # Targets hlds_amd64 / cs_amd64.so deployments.
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86_64
            multilib: false
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize --target-arch=x86_64"

          # ------------------------------------------------------------------
          # Linux AMD64 Fast  (AMBuild / GCC / ubuntu-22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86_64
            multilib: false
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --target-arch=x86_64 --extra-cppflags=-D__BUILD_FAST_METAMOD__"

          # ------------------------------------------------------------------
          # Windows Release  (AMBuild / MSVC / windows-2022)
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            package_ext: zip
            dbg_ext: pdb
            cc: not-used
            cxx: not-used
            vs_arch: x32
            am_arch: x86
            multilib: false
            build_type: release
            artifact_suffix: ""
            configure_flags: "--symbol-files --enable-optimize"

          # ------------------------------------------------------------------
          # Windows Fast  (AMBuild / MSVC / windows-2022)
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            package_ext: zip
            dbg_ext: pdb
            cc: not-used
            cxx: not-used
            vs_arch: x32
            am_arch: x86
            multilib: false
            build_type: fast
            artifact_suffix: "-fast"
            configure_flags: "--symbol-files --enable-optimize --extra-cppflags=-D__BUILD_FAST_METAMOD__"

          # ------------------------------------------------------------------
          # Linux x86 Debug  (AMBuild / GCC-7 / Docker ubuntu:18.04)
          # Produces a debug .so with -g3 -ggdb3 -O0 + ASan/UBSan/LSan.
          # No --enable-optimize; AMBuildScript debug path sets these flags.
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86
            multilib: true
            build_type: debug
            artifact_suffix: "-debug"
            configure_flags: "--symbol-files --enable-debug"

          # ------------------------------------------------------------------
          # Linux AMD64 Debug  (AMBuild / GCC / ubuntu-22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            package_ext: tar.gz
            dbg_ext: dbg
            cc: gcc
            cxx: g++
            vs_arch: unused
            am_arch: x86_64
            multilib: false
            build_type: debug
            artifact_suffix: "-debug"
            configure_flags: "--symbol-files --enable-debug --target-arch=x86_64"

          # ------------------------------------------------------------------
          # Windows Debug  (AMBuild / MSVC / windows-2022)
          # /Od /RTC1 /MDd with debug info; no WPO.
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            package_ext: zip
            dbg_ext: pdb
            cc: not-used
            cxx: not-used
            vs_arch: x32
            am_arch: x86
            multilib: false
            build_type: debug
            artifact_suffix: "-debug"
            configure_flags: "--symbol-files --enable-debug"

    steps:
      # -----------------------------------------------------------------------
      # Linux x86 setup (inside ubuntu:18.04 container)
      # The container runs as root with no sudo available.
      # python3, pip and git must be installed here as the container image
      # does not include them, and setup-python/checkout need git.
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.multilib == true
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y gcc g++ gcc-multilib g++-multilib python3 python3-pip git
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Linux AMD64 setup (bare ubuntu-22.04 runner, sudo available)
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux AMD64)
        if: runner.os == 'Linux' && matrix.multilib == false
        run: |
          sudo apt-get update
          # libasan6 + libubsan1 required for -fsanitize=address/undefined/leak
          # in debug builds on ubuntu-22.04 (GCC 11 runtime).
          sudo apt-get install -y gcc g++ libasan6 libubsan1
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Windows setup
      # -----------------------------------------------------------------------
      - name: Add MSBuild to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v3

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=*" %%i in (`vswhere -latest -property installationPath`) do (
            call "%%i"\Common7\Tools\vsdevcmd.bat -arch=${{ matrix.vs_arch }} -host_arch=x64
          )
          for /f "delims== tokens=1,2" %%a in ('set') do (
            echo>>"%GITHUB_ENV%" %%a=%%b
          )

      # -----------------------------------------------------------------------
      # Node.js 24  — required by newer AMBuild versions
      # -----------------------------------------------------------------------
      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # -----------------------------------------------------------------------
      # Python + AMBuild
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install AMBuild
        run: |
          python -m pip install --upgrade pip wheel
          pip install git+https://github.com/alliedmodders/ambuild

      # -----------------------------------------------------------------------
      # Checkout & build
      # -----------------------------------------------------------------------
      - name: Fetch Metamod-P
        uses: actions/checkout@v5
        with:
          path: metamod-p
          submodules: recursive

      - name: Build (AMBuild)
        working-directory: metamod-p
        run: |
          mkdir post
          cd post
          export AM_ARCH=${{ matrix.am_arch }}
          python3 ../configure.py ${{ matrix.configure_flags }}
          ambuild

      # -----------------------------------------------------------------------
      # Artifacts
      # github.sha is the full commit SHA provided natively by GitHub Actions.
      # No third-party short-sha action is needed or used.
      # -----------------------------------------------------------------------
      - name: Upload binary (AMBuild)
        uses: actions/upload-artifact@v6
        with:
          name: metamod-p-ambuild-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: metamod-p/post/*

      - name: Upload debug symbols (AMBuild)
        uses: actions/upload-artifact@v6
        with:
          name: metamod-p-ambuild-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: metamod-p/post/**/*.${{ matrix.dbg_ext }}
          if-no-files-found: ignore


# ===========================================================================
#  Native build jobs  (Linux Makefile  /  Windows MSBuild .vcxproj)
# ===========================================================================
  build_native:
    name: "[Native] ${{ matrix.build_type }} for ${{ matrix.os_short }}"
    runs-on: ${{ matrix.os_version }}

    # Same Docker container strategy as build_ambuild for 32-bit Linux rows.
    container: ${{ matrix.container }}

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------
          # Linux x86 Release  (Makefile / GCC-7 / Docker ubuntu:18.04)
          # OPT=opt  →  optimised build, NDEBUG, output to opt.linux_i386/
          # do_dll_linux copies the final .so to ../dlls/metamod.so
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            build_type: release
            artifact_suffix: ""
            multilib: true
            make_args: "OPT=opt"

          # ------------------------------------------------------------------
          # Linux x86 Fast  (Makefile / GCC-7 / Docker ubuntu:18.04)
          # OPT=opt-fast  →  OPT=opt + -D__BUILD_FAST_METAMOD__ (the Makefile
          # injects the define automatically; no EXTRA_CPPFLAGS needed)
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            build_type: fast
            artifact_suffix: "-fast"
            multilib: true
            make_args: "OPT=opt-fast"

          # ------------------------------------------------------------------
          # Linux AMD64 Release  (Makefile / GCC / ubuntu-22.04)
          # TARGET=amd64  →  CC="gcc -m64", CCOPT_ARCH=-march=x86-64,
          # output to opt.linux_amd64/metamod.so
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            build_type: release
            artifact_suffix: ""
            multilib: false
            make_args: "OPT=opt TARGET=amd64"

          # ------------------------------------------------------------------
          # Linux AMD64 Fast  (Makefile / GCC / ubuntu-22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            build_type: fast
            artifact_suffix: "-fast"
            multilib: false
            make_args: "OPT=opt-fast TARGET=amd64"

          # ------------------------------------------------------------------
          # Windows Release  (MSBuild / MSVC / windows-2022)
          # .sln and .vcxproj both live in metamod\.
          # OutDir = $(SolutionDir)$(Configuration)\ → metamod\Release\
          # Release config has GenerateDebugInformation=false → no PDB.
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            build_type: release
            artifact_suffix: ""
            multilib: false
            msbuild_config: "Release"
            msbuild_platform: "Win32"

          # ------------------------------------------------------------------
          # Windows Fast  (MSBuild / MSVC / windows-2022)
          # Fast is a first-class .sln configuration; __BUILD_FAST_METAMOD__
          # is already in its PreprocessorDefinitions — no injection needed.
          # OutDir → metamod\Fast\
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            build_type: fast
            artifact_suffix: "-fast"
            multilib: false
            msbuild_config: "Fast"
            msbuild_platform: "Win32"

          # ------------------------------------------------------------------
          # Linux x86 Debug  (Makefile / GCC-7 / Docker ubuntu:18.04)
          # Default OPT (no value) → debug build: -g3 -ggdb3 -O0 + sanitizers.
          # Output goes to debug.linux_i386/ and ../dlls/debug/metamod.so
          # ------------------------------------------------------------------
          - os_short: linux
            os_version: ubuntu-22.04
            container: ubuntu:18.04
            build_type: debug
            artifact_suffix: "-debug"
            multilib: true
            make_args: ""

          # ------------------------------------------------------------------
          # Linux AMD64 Debug  (Makefile / GCC / ubuntu-22.04)
          # ------------------------------------------------------------------
          - os_short: linux-amd64
            os_version: ubuntu-22.04
            container: ""
            build_type: debug
            artifact_suffix: "-debug"
            multilib: false
            make_args: "TARGET=amd64"

          # ------------------------------------------------------------------
          # Windows Debug  (MSBuild / MSVC / windows-2022)
          # Debug|Win32 config: /Od /RTC1 /MDd /ZI, GenerateDebugInformation=true
          # OutDir → metamod\Debug\ → produces metamod.dll + metamod.pdb
          # ------------------------------------------------------------------
          - os_short: win32
            os_version: windows-2022
            container: ""
            build_type: debug
            artifact_suffix: "-debug"
            multilib: false
            msbuild_config: "Debug"
            msbuild_platform: "Win32"

    steps:
      # -----------------------------------------------------------------------
      # Linux x86 setup (inside ubuntu:18.04 container, no sudo)
      # git is required for actions/checkout to work inside the container.
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.multilib == true
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y gcc g++ gcc-multilib g++-multilib make git
          echo "CC=gcc"  >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Linux AMD64 setup (bare ubuntu-22.04 runner, sudo available)
      # -----------------------------------------------------------------------
      - name: Install dependencies (Linux AMD64)
        if: runner.os == 'Linux' && matrix.multilib == false
        run: |
          sudo apt-get update
          # libasan6 + libubsan1 are required for -fsanitize=address/undefined/leak
          # in debug builds. gcc and g++ pull in the right runtime stubs but the
          # shared library packages must be present for the linker to resolve them.
          sudo apt-get install -y gcc g++ make libasan6 libubsan1
          echo "CC=gcc"  >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Windows setup
      # -----------------------------------------------------------------------
      - name: Add MSBuild to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v3

      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Fetch Metamod-P
        uses: actions/checkout@v5
        with:
          path: metamod-p
          submodules: recursive

      # -----------------------------------------------------------------------
      # Linux — Makefile build
      # -----------------------------------------------------------------------
      - name: Build (Linux Makefile)
        if: runner.os == 'Linux'
        working-directory: metamod-p
        run: |
          mkdir -p native_out

          # Drive the metamod subdir directly (the toplevel Makefile just
          # loops over $(SUBDIRS) from Config.mak; we only need metamod here).
          #
          # The Makefile's OPT= and TARGET= variables control everything:
          #   OPT=opt        → release build  (NDEBUG, -O2, LTO)
          #   OPT=opt-fast   → fast build     (above + __BUILD_FAST_METAMOD__)
          #   TARGET=amd64   → 64-bit         (CC="gcc -m64", march=x86-64)
          #   (default)      → 32-bit         (CC="gcc -m32", march=i686)
          #
          # do_dll_linux builds the .so and installs it to ../dlls/metamod.so
          # (or ../dlls/debug/metamod.so for the debug OPT= default build).
          make -C metamod do_dll_linux ${{ matrix.make_args }} -j$(nproc)

          # Collect the final .so — release/fast land in dlls/, debug lands
          # in dlls/debug/ (the Makefile sets DLLS_DIR := $(DLLS_DIR)/debug
          # when no OPT is specified).
          find dlls -name "*.so" | \
            xargs -I{} cp {} native_out/ 2>/dev/null || true

      # -----------------------------------------------------------------------
      # Windows — MSBuild build
      # -----------------------------------------------------------------------
      - name: Build (Windows MSBuild)
        if: runner.os == 'Windows'
        working-directory: metamod-p
        shell: cmd
        run: |
          :: The .sln and .vcxproj both live in metamod\.
          :: working-directory is metamod-p so we invoke: msbuild metamod\metamod.sln
          :: $(SolutionDir) = <ws>\metamod-p\metamod\ (folder containing the .sln)
          :: OutDir = $(SolutionDir)$(Configuration)\ e.g. metamod-p\metamod\Release\
          :: /v:normal so build errors are visible in the Actions log.
          msbuild metamod\metamod.sln ^
            /p:Configuration=${{ matrix.msbuild_config }} ^
            /p:Platform=${{ matrix.msbuild_platform }} ^
            /m ^
            /v:normal

          :: Show what MSBuild actually produced so path issues are visible.
          echo --- Build output tree ---
          dir /s /b metamod\${{ matrix.msbuild_config }}\* 2>nul || echo (directory not found)

          :: Copy outputs into the staging folder.
          :: Release/Fast: GenerateDebugInformation=false → no .pdb
          :: Debug:        GenerateDebugInformation=true  → .pdb present
          mkdir native_out 2>nul || ver>nul
          if exist metamod\${{ matrix.msbuild_config }}\metamod.dll (
            copy /y metamod\${{ matrix.msbuild_config }}\metamod.dll native_out\
          ) else (
            echo ERROR: metamod.dll not found at expected path
            dir /s /b metamod\ 2>nul
            exit /b 1
          )
          if exist metamod\${{ matrix.msbuild_config }}\metamod.pdb (
            copy /y metamod\${{ matrix.msbuild_config }}\metamod.pdb native_out\
          )

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload binary (Native)
        uses: actions/upload-artifact@v6
        with:
          name: metamod-p-native-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: metamod-p/native_out/*

      - name: Upload debug symbols (Native / Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: metamod-p-native-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: metamod-p/native_out/**/*.dbg
          if-no-files-found: ignore

      - name: Upload debug symbols (Native / Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: metamod-p-native-dbgsym-${{ matrix.os_short }}${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: metamod-p/native_out/**/*.pdb
          if-no-files-found: ignore
